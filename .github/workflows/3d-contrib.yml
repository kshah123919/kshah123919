name: 3D Contribution Graph
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          USERNAME: kshah123919
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit & Push
        run: |
          git config --global user.email "krishshah062021@gmail.com"
          git config --global user.name "kshah123919"
          git add -f profile-3d-contrib/*.svg
          git commit -m "Generate 3D contribution graph" || exit 0
          git push
